name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend root
        run: curl -fsS --retry 3 --retry-delay 5 https://talentconnect-backend-qu3k.onrender.com/ > /dev/null

      - name: Ping backend health
        run: curl -fsS --retry 3 --retry-delay 5 https://talentconnect-backend-qu3k.onrender.com/api/health > /dev/null
